# Banco H2 para testes
spring.datasource.url=jdbc:h2:mem:saasdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=SA
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Mail fake para testes
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Props customizadas da app
app.mail.enabled=false
app.mail.from=no-reply@test.com
app.frontend.reset-password-url=http://localhost:3000/reset-password

# JWT fake para testes
app.jwt.secret=dGVzdGUtc2VjcmV0LWtleS1tdWl0by1sb25nby1wYXJhLXRlc3Rlcw==
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000
app.password-reset.expiration-ms=1800000
