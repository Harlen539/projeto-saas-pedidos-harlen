services:
  db:
    image: postgres:16
    container_name: saas-pedidos-db
    environment:
      POSTGRES_DB: saas_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d saas_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: saas-pedidos-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/saas_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      APP_JWT_SECRET: c2Fhcy1wZWRpZG9zLWRvY2tlci1zZWNyZXQtdmVyeS1sb25nLWtleS0yMDI2LXNhYXM=
      APP_JWT_EXPIRATION_MS: 86400000
      APP_JWT_REFRESH_EXPIRATION_MS: 604800000
      APP_PASSWORD_RESET_EXPIRATION_MS: 1800000
      APP_FRONTEND_RESET_PASSWORD_URL: http://localhost:3000/reset-password
      APP_MAIL_ENABLED: "false"
    ports:
      - "8080:8080"

volumes:
  postgres_data:
